# ─── Configuración Nginx para EPG-UAC ────────────────────────────────────────
# Servidor: dataepis.uandina.pe
# Backend: FastAPI/Uvicorn en puerto 8000
# Frontend: Vue 3 compilado (dist/) servido estáticamente
#
# Instalación:
#   sudo cp epg-posgrado.conf /etc/nginx/sites-available/epg-posgrado
#   sudo ln -s /etc/nginx/sites-available/epg-posgrado /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80 ssl;
    listen [::]:80 ssl;
    server_name dataepis.uandina.pe;

    # ── SSL (Certbot / Let's Encrypt) ──
    ssl_certificate     /home/bot-whatsapp/certs/fullchain.pem;
    ssl_certificate_key /home/bot-whatsapp/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Logs ──
    access_log /var/log/nginx/epg-access.log;
    error_log  /var/log/nginx/epg-error.log;

    # ── 1. Frontend Vue (archivos estáticos) ──────────────────────────────────
    # Sirve el build de Vue en la raíz. El alias apunta al dist/ compilado.
    location / {
        root /opt/sistema_posgrado/frontend/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── 2. Backend API (proxy inverso al Uvicorn) ─────────────────────────────
    location /bot-posgrado/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts generosos para operaciones largas (scraping, subida Drive)
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;

        # Tamaño máximo de upload (PDFs, resoluciones)
        client_max_body_size 50M;
    }

    # Editor Word institucional: se ejecuta privado en Docker y sólo se
    # publica por este proxy HTTPS bajo el mismo dominio del sistema.
    location /onlyoffice/ {
        proxy_pass http://127.0.0.1:8082/;
        proxy_http_version 1.1;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 50M;
    }

    # ── 3. Archivos de expedientes (uploads locales) ──────────────────────────
    location /expedientes/ {
        alias /opt/sistema_posgrado/uploads/expedientes/;
        # Seguridad: desactivar listado de directorios
        autoindex off;
        # Cache de 1 hora para archivos estáticos
        expires 1h;
        add_header Cache-Control "public";
    }

    # ── 4. Cabeceras de seguridad globales ────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
}
